<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compression Visualizer</title>
 <!--chicken butt-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: monospace;
    background: #fff;
    color: #111;
    padding: 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  h1 { font-size: 18px; font-weight: normal; margin-bottom: 24px; }

  textarea {
    width: 100%;
    height: 160px;
    border: 1px solid #ccc;
    padding: 12px;
    font-family: monospace;
    font-size: 13px;
    resize: vertical;
    outline: none;
  }

  textarea:focus { border-color: #111; }

  button {
    margin-top: 10px;
    padding: 8px 20px;
    background: #111;
    color: #fff;
    border: none;
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
  }

  button:hover { background: #333; }

  #output {
    margin-top: 32px;
    line-height: 2;
    font-size: 15px;
  }

  .chunk {
    padding: 2px 4px;
    border-radius: 2px;
    cursor: default;
    position: relative;
  }

  .src-training     { background: #cceeff; }
  .src-pattern      { background: #d4f5c0; }
  .src-interpolated { background: #ffd6c0; }
  .src-template     { background: #e8d4ff; }
  .src-noise        { background: #e8e8e8; }

  .chunk:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: #111;
    color: #fff;
    font-size: 11px;
    padding: 5px 8px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }

  .legend {
    margin-top: 24px;
    font-size: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    color: #444;
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 12px; height: 12px;
    border-radius: 2px;
    display: inline-block;
  }

  .stats {
    margin-top: 20px;
    font-size: 12px;
    color: #666;
  }
</style>
</head>
<body>

<h1>Décodeur de compression IA</h1>

<textarea id="input" placeholder="Collez une réponse générée par un LLM…"></textarea>
<br>
<button onclick="analyze()">Analyser</button>

<div id="output"></div>

<script>
const TEMPLATES = new Set(['en','effet','par','conséquent','ainsi','donc','cependant','néanmoins','toutefois','or','certes','moreover','however','therefore','furthermore','thus','indeed','in','conclusion','as','a','result','on','the','other','hand','de','plus','autrement','dit','dans','ce','contexte','premièrement','deuxièmement','enfin','firstly','secondly','finally','to','sum','up','in','summary']);
const HIGH_FREQ = new Set(['le','la','les','un','une','des','est','sont','être','avoir','avec','pour','dans','sur','par','ce','qui','que','comme','the','a','an','is','are','was','were','be','been','have','has','had','do','does','did','will','would','could','should','this','that','and','or','but','not','with','intelligence','artificielle','modèle','données','apprentissage','réseau','neurones','algorithme','information','système','machine','learning','model','data','neural','network','training','language','text','prediction','compression']);
const SYNTAX = new Set(['qui','que','dont','où','lequel','laquelle','which','where','when','whose','whom','si','although','because','since','whereas','while','unless','whether']);

const CATS = {
  training:     { label: 'Corpus d\'entraînement', cls: 'src-training',     tip: 'Mot haute fréquence — K(x) faible, bien compressé.' },
  pattern:      { label: 'Pattern syntaxique',     cls: 'src-pattern',      tip: 'Structure syntaxique encodée par le modèle.' },
  interpolated: { label: 'Interpolation',          cls: 'src-interpolated', tip: 'Zone d\'incompressibilité — risque d\'hallucination.' },
  template:     { label: 'Template discursif',     cls: 'src-template',     tip: 'Connecteur / formule rhétorique récurrente.' },
  noise:        { label: 'Bruit résiduel',         cls: 'src-noise',        tip: 'Faible signal, entropie résiduelle élevée.' }
};

function categorize(word) {
  const w = word.replace(/[.,!?;:'"()\[\]]/g, '').toLowerCase();
  if (!w || w.length <= 1) return 'noise';
  if (TEMPLATES.has(w)) return 'template';
  if (SYNTAX.has(w)) return 'pattern';
  if (/^\d{4}$/.test(w) || /^[A-Z][a-z]{5,}$/.test(word) || /\d+\.\d+/.test(w)) return 'interpolated';
  if (HIGH_FREQ.has(w)) return 'training';
  if (w.length <= 4) return 'training';
  if (w.length >= 12) return 'interpolated';
  const r = hash(w);
  if (r < 0.38) return 'training';
  if (r < 0.58) return 'pattern';
  if (r < 0.72) return 'template';
  if (r < 0.84) return 'interpolated';
  return 'noise';
}

function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return (Math.abs(h) % 1000) / 1000;
}

function analyze() {
  const text = document.getElementById('input').value.trim();
  if (!text) return;

  const tokens = text.match(/\S+|\n/g) || [];
  const counts = { training: 0, pattern: 0, interpolated: 0, template: 0, noise: 0 };
  let html = '';
  let total = 0;

  for (const tok of tokens) {
    if (tok === '\n') { html += '<br>'; continue; }
    const cat = categorize(tok);
    counts[cat]++;
    total++;
    const esc = tok.replace(/"/g, '&quot;').replace(/</g, '&lt;');
    html += `<span class="chunk ${CATS[cat].cls}" data-tip="${CATS[cat].tip}">${esc}</span> `;
  }

  const halluc = total ? ((counts.interpolated + counts.noise * 0.3) / total * 100).toFixed(0) : 0;
  const compress = total ? ((1 - (counts.interpolated + counts.noise * 0.5) / total) * 100).toFixed(0) : 0;

  document.getElementById('output').innerHTML = `
    <div>${html}</div>
    <div class="legend">
      <span><i class="dot" style="background:#cceeff"></i>Corpus d'entraînement</span>
      <span><i class="dot" style="background:#d4f5c0"></i>Pattern syntaxique</span>
      <span><i class="dot" style="background:#ffd6c0"></i>Interpolation</span>
      <span><i class="dot" style="background:#e8d4ff"></i>Template discursif</span>
      <span><i class="dot" style="background:#e8e8e8"></i>Bruit résiduel</span>
    </div>
    <div class="stats">${total} tokens — compression estimée ${compress}% — risque hallucination ${halluc}%</div>
  `;
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) analyze();
});
</script>
</body>
</html>
